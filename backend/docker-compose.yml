services:
  mysql:
    image: mysql:8.0
    container_name: smartair_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartair
      MYSQL_USER: smartair
      MYSQL_PASSWORD: smartair
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: smartair_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    container_name: smartair_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: smartair_grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    depends_on:
      - prometheus

volumes:
  mysql_data:
