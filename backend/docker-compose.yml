services:
  mysql:
    image: mysql:8.0
    container_name: smartair_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartair
      MYSQL_USER: smartair
      MYSQL_PASSWORD: smartair
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: smartair_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
